name: TOTM Randevu Kontrol

on:
  schedule:
    # Her 30 dakikada bir (GitHub cron'u UTC'de çalışır)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # Manuel tetikleme

# Önceki çalışma hâlâ sürüyorsa iptal et
concurrency:
  group: randevu-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore previous state
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: randevu-state-${{ github.run_id }}
          restore-keys: |
            randevu-state-

      - name: Run check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          # Poliklinik adı (Türkçe-aware substring eşleşmesi yapılır):
          POLIKLINIK_ADI: "KARACİĞER NAKİL ENS.POL.1"
        run: python check_appointment.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            debug_screenshots/
            last_state.json
          if-no-files-found: ignore
          retention-days: 7
